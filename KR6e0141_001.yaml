body:
  text: 皇明古庭善堅撰華嚴之說其義也大其文也長非盡得其妙者難以筆舌毗盧老人一真三昧于當人分上最真最切開口也說著不開口也說著開口不開口總說著一切佛法一切玄妙一切機用一切拈提一切棒喝一切語言一切文字一切三昧用則總用不用則總不用用與不用總不相礙世尊升座文殊白槌云諦觀法王法法王法如是世尊便下座文殊便是開口用處世尊便下座是不開口用處到這裏世尊說箇什麼若道有說文殊早自錯了若道無說世尊升座又自錯了若論華藏大意說與未說錯與未錯開口不開口舉目之間一點瞞人不得如趙州問投子大死的人却活時如何子云不許夜行投明早到似此一問一答如常人說話又不曾作機會又不曾作禪道佛法會爾之江南我之湖北爾之天上我之人間四方八面無不相應若不到與麼田地縱將一大藏教一口吐出堆山塞海總無用處世尊未升座文殊未白槌趙州投子未相見已將全機交付了盡華嚴法界香水海一切諸佛諸善知識却無措手腳處經云如來深境界其量等虗空一切衆生入而實無所入既無所入安有所說此外不可為儞別加方便古人云參須實參悟須實悟如懶融未見四祖馬祖未見南嶽他何曾似今學者東卜西卜個個死心榻地學者只知開口處將謂容易安身著腳不知未開口時縱是佛祖也難近傍僧問雲門如何是一代時教門云對一說一且道與世尊升座文殊白槌差別多少僧問趙州萬法歸一一歸何處州云我在青州做領布衫重七斤這等說話前後遠近宛爾一般古人行到說到一一皆在大不思議海昔香嚴和尚在溈山問一答十問十答百溈山向真參實悟處痛與一劄嚴不知所以于是入南陽卓菴擊竹有省後出世曰老僧四十年方打成一片趙州和尚二十餘年除粥飯屎尿是雜用心處高峯三十年不出死關先師四十年惟一念長慶稜公坐破蒲團七箇山僧做工夫十三年身不放倒今年七十餘猶念死生未敢離于正念古人念念在定于生死不亂今人念念在亂于生死不定學者還知正念麼如前所說乃如來深境界是也山僧昔年到先師處徵問到無結角下手處不免盡力掀倒先師說箇是字如今勘來多少錯任緣隨分且待命根子斷山僧每于華嚴留心據我所見善財參五十三善知識未嘗動步五十三善知識教授善財未嘗開口我毗盧舍那如來雜華藏海一字一句一切字一切句一一具足四天下微塵數不可說轉轉不可說一一三昧一一語言一一香水海一一輪圍山一一毗盧華藏一一彌勒樓閣一一諸佛菩薩一一大善知識一一觀彼所說諸佛華藏一一語言三昧一一辨才三昧一一神通無礙一一佛神力莊嚴佛剎微塵數諸佛世界一一諸佛世尊所演佛剎微塵數三昧門不可思議微細微細極微細處則知諸佛菩薩及五十三知識所說佛剎微塵數諸佛藏海一一三昧于我自受用一真三昧遮那如來無增無減無彼無此華嚴藏海諸佛菩薩諸善知識各各盡彼神通三昧向我遮那諸佛佛剎微塵數三昧大不思議海轉不可說三昧一一莊嚴一一文字一一摩尼寶光明一一佛剎微塵數寶牀寶座寶帳寶綱寶樹寶雲寶蓮華寶瓔珞一一佛剎微塵數獅子幢雲摩尼幢雲燈雲𦦨雲華𦦨雲香𦦨雲一一佛剎微塵數摩尼寶光聚一一佛剎微塵數諸佛變化莊嚴身一一佛剎微塵數國城善知識與夫目前山河大地萬象森羅種種差別聲音差別幻化差別相好乃至諸大地獄八寒八熱萬死萬生及彼忉利諸天天樂一一佛剎微塵數不可說不可說轉不可說轉轉不可說總是箇華嚴藏海一真三昧與麼則佛剎微塵數華嚴藏海諸佛諸菩薩諸善知識諸天人非人等而又一一佛剎微塵數不可說不可說轉不可說轉轉不可說一一四生六道蠢動含靈有情無情一一皆總在我佛剎微塵數極微塵數華嚴藏海一一混融無礙山僧如是說汝等如是聞諸佛如是住一切衆生如是見衆生如是見諸佛如是住汝等如是聞山僧如是說而又各各一一聞見住說一一塵沙草葉則有佛剎微塵數諸佛世界一一塵一一沙一一草一一葉佛剎微塵數諸佛世界一一經歷諸佛世界三昧一一諸佛三昧佛剎微塵數世界了不可得而我了知一一諸佛世界種種差別一切幻化一一皆不可得皆不可了而我知其不可了不可見不可得我常一念恆處于寂滅定求寂滅法實無所有如是則寂滅念中一切諸佛一切佛剎微塵諸三昧海種種莊嚴種種世界種種差別種種供養諸佛幻化我亦無念以茲無念諸佛幻化念念具足念念不違謂之華嚴法界大意幻有之說而幻有如是三昧況八十一軸之文及十法界品之說不可思不可議書而盡為一軸卷之放之而更收之與麼則八十一軸百城烟水總是外事諸佛菩薩諸善知識皆為客塵不妨逆行順行橫說竪說塵說剎說所以經中道由親近善知識能勇猛勤修一切智道由親近善知識能速疾出生諸大願海由親近善知識能于一微塵中說法遍法界由親近善知識于念念行究竟安住一切智地由親近善知識而能往十方國土見善知識心不散亂見善知識破障山見善知識入大悲海救護衆生見善知識得智慧光普照法界見善知識普能覩見十方佛海見善知識得見諸佛轉于法輪與麼則佛剎微塵數善知識正好逐位參求佛剎微塵數諸佛三昧不妨從頭請問善知識者有如是不可思議不可說無量無邊清淨三昧欲親近善知識者必具大因緣具無上智發無上心經百千劫久遠不退始得如是相應首座只如文殊大士伸一臂過佛剎微塵數諸佛世界摩善財頂山僧不動本座過佛剎微塵數諸佛世界將華藏海遮那如來不可思議三昧向一毫頭滔滔說出且道與文殊是同是別非同非別總同總別師擲去筆云紙盡矣卷之
